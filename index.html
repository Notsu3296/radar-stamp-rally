<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>レーダー</title>
    <link rel="stylesheet" href="styles.css?v=20260622-1">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <button id="historyButton" class="icon-text-button" type="button">履歴を見る</button>
      </header>

      <section class="radar-section" aria-label="未訪問地点レーダー">
        <div class="radar-wrap">
          <div class="radar" id="radar">
            <div id="compassLabels" class="compass-labels" aria-hidden="true">
              <span data-bearing="0">N</span>
              <span data-bearing="90">E</span>
              <span data-bearing="180">S</span>
              <span data-bearing="270">W</span>
            </div>
            <div class="radar-sweep"></div>
            <div class="radar-ring ring-1"></div>
            <div class="radar-ring ring-2"></div>
            <div class="radar-ring ring-3"></div>
            <div class="radar-axis axis-v"></div>
            <div class="radar-axis axis-h"></div>
            <div class="radar-center"></div>
            <div id="radarMarkers"></div>
          </div>
        </div>
      </section>

      <section class="action-panel" aria-live="polite">
        <div id="qrNotice" class="notice hidden"></div>
        <div id="locationSummary" class="summary">現在地は未取得です。</div>
        <div id="visitActions" class="visit-actions"></div>
        <div class="controls">
          <button id="locateButton" class="primary-button" type="button">現在地・方角を更新</button>
          <div class="control-menu-wrap">
            <button id="rangeButton" class="secondary-button" type="button" aria-expanded="false">表示範囲：通常</button>
            <div id="rangeMenu" class="option-menu hidden" role="group" aria-label="表示範囲を選択">
              <div id="rangeOptions" class="option-list"></div>
              <button id="rangeConfirmButton" class="menu-confirm-button" type="button" disabled>確定</button>
            </div>
          </div>
          <div class="control-menu-wrap">
            <button id="categoryButton" class="secondary-button" type="button" aria-expanded="false">カテゴリ表示</button>
            <div id="categoryMenu" class="option-menu hidden" role="group" aria-label="表示カテゴリを選択">
              <div id="categoryOptions" class="option-list"></div>
              <button id="categoryCloseButton" class="menu-confirm-button" type="button">閉じる</button>
            </div>
          </div>
          <button id="labelsButton" class="secondary-button" type="button" aria-pressed="false">地点名を表示</button>
          <button id="resetButton" class="secondary-button" type="button">履歴をリセット</button>
        </div>
      </section>
    </main>

    <dialog id="historyDialog" class="history-dialog">
      <div class="dialog-head">
        <h2>訪問履歴</h2>
        <button id="closeHistoryButton" class="close-button" type="button" aria-label="閉じる">×</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </dialog>

    <script src="app.js?v=20260622-1" defer></script>
  </body>
</html>
