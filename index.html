<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>レーダー</title>
    <link rel="stylesheet" href="styles.css?v=20260625-4">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <button id="menuButton" class="menu-button" type="button" aria-controls="actionPanel" aria-expanded="false" aria-label="メニューを開く">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>

      <section class="radar-section" aria-label="未訪問地点レーダー">
        <button id="qrScanButton" class="qr-scan-button" type="button">QR CHECK-IN</button>
        <div class="radar-wrap">
          <div class="radar" id="radar">
            <div id="compassLabels" class="compass-labels" aria-hidden="true">
              <span data-bearing="0">N</span>
              <span data-bearing="90">E</span>
              <span data-bearing="180">S</span>
              <span data-bearing="270">W</span>
            </div>
            <div class="radar-sweep"></div>
            <div class="radar-ring ring-1"></div>
            <div class="radar-ring ring-2"></div>
            <div class="radar-ring ring-3"></div>
            <div class="radar-axis axis-v"></div>
            <div class="radar-axis axis-h"></div>
            <div class="radar-center"></div>
            <div id="radarMarkers"></div>
          </div>
        </div>
        <div class="range-console" aria-label="表示範囲">
          <div class="range-console-head">
            <span>SCAN RANGE</span>
            <strong id="rangeModeLabel">通常</strong>
          </div>
          <input id="rangeSlider" class="range-slider" type="range" min="0" max="2" step="1" value="1" aria-label="表示範囲を切り替え">
          <div class="range-ticks" aria-hidden="true">
            <span>詳細</span>
            <span>通常</span>
            <span>広域</span>
          </div>
        </div>
      </section>

      <section id="actionPanel" class="action-panel" aria-live="polite">
        <div class="menu-head">
          <span>CONTROL MENU</span>
          <button id="closeMenuButton" class="close-button" type="button" aria-label="メニューを閉じる">×</button>
        </div>
        <div class="controls">
          <button class="secondary-button menu-item-button" type="button" data-detail="status">記録状況</button>
          <button class="secondary-button menu-item-button" type="button" data-detail="category">カテゴリ表示</button>
          <button class="secondary-button menu-item-button" type="button" data-detail="labels">地点名表示</button>
          <button class="secondary-button menu-item-button" type="button" data-detail="history">地点履歴</button>
          <button class="secondary-button menu-item-button" type="button" data-detail="reset">履歴リセット</button>
        </div>
      </section>
      <div id="menuBackdrop" class="menu-backdrop" hidden></div>

      <button id="locateIconButton" class="locate-icon-button" type="button" aria-label="現在地と方角を更新">
        <span aria-hidden="true">⌖</span>
      </button>

      <section id="detailPanel" class="detail-panel hidden" aria-live="polite" aria-label="メニュー詳細">
        <div class="detail-window">
          <div class="detail-head">
            <div>
              <span class="detail-kicker">MISSION CONTROL</span>
              <h2 id="detailTitle">詳細</h2>
            </div>
            <button id="closeDetailButton" class="close-button" type="button" aria-label="詳細を閉じる">×</button>
          </div>
          <div id="detailBody" class="detail-body"></div>
        </div>
      </section>
      <div id="detailBackdrop" class="detail-backdrop" hidden></div>
    </main>

    <script src="app.js?v=20260625-4" defer></script>
  </body>
</html>
